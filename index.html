<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tales Lanchonete</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#fff8f0;
color:#333;
text-align:center;
}

header{
background:#000;
color:#fff;
padding:20px;
}

header h1{
margin:0;
font-size:2rem;
}

section{
padding:20px;
}

.btn{
display:inline-block;
margin:20px auto;
padding:15px 25px;
background:#f77f00;
color:white;
text-decoration:none;
font-size:1.1rem;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#e76f00;
transform:scale(1.05);
}

.cardapio-img{
width:100%;
max-width:500px;
margin:20px auto;
display:block;
border-radius:10px;
}

/* ANIMAÇÃO */
.animar{
opacity:0;
transform:translateY(20px);
transition:all 0.5s ease;
}

.animar.show{
opacity:1;
transform:translateY(0);
}

footer{
background:#333;
color:white;
padding:10px;
font-size:0.9rem;
}
</style>

</head>

<body>

<header>
<h1>Tales Lanchonete</h1>
</header>

<section>

<h2>📋 Nosso Cardápio</h2>
<p>Clique nas imagens abaixo para visualizar melhor 👇</p>

<img src="Cardapio 2.jpeg" class="cardapio-img">
<img src="Cardapio 1.jpeg" class="cardapio-img">

<!-- BOTÃO NOVIDADE -->
<div class="btn" onclick="toggleNovidade()">
🔥 Novidade - Clique aqui
</div>

<div id="novidade" class="animar" style="display:none;">
<img src="Cardapio 3.jpeg" class="cardapio-img">
</div>

<!-- NOVO BOTÃO BATATA -->
<div class="btn" onclick="toggleBatata()">
🍟 Porções de Batata - Clique aqui
</div>

<!-- NOVA IMAGEM BATATA -->
<div id="batata" class="animar" style="display:none;">
<img src="Cardapio-batata.jpeg" class="cardapio-img">
</div>

<a href="https://wa.me/5514999060526" class="btn">
📲 Fazer pedido pelo WhatsApp
</a>

</section>

<footer>
© 2026 - Tales Lanchonete
</footer>

<script>
function toggleNovidade(){
var x = document.getElementById("novidade");

if(x.style.display === "none"){
x.style.display = "block";
setTimeout(()=> x.classList.add("show"), 10);
}else{
x.classList.remove("show");
setTimeout(()=> x.style.display = "none", 300);
}
}

function toggleBatata(){
var x = document.getElementById("batata");

if(x.style.display === "none"){
x.style.display = "block";
setTimeout(()=> x.classList.add("show"), 10);
}else{
x.classList.remove("show");
setTimeout(()=> x.style.display = "none", 300);
}
}
</script>

</body>
</html>
